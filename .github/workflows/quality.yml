name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go tests and analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -covermode=atomic ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.1
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.10 ./...
      - run: go run github.com/zricethezav/gitleaks/v8@v8.27.2 detect --source . --no-git

  configuration:
    name: Configuration lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint < Dockerfile
      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7
