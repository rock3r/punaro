name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go tests and analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      # The suite normally completes in well under a minute. A bounded timeout
      # turns any platform-specific deadlock into a useful goroutine dump rather
      # than leaving the runner opaque for Go's default ten-minute timeout.
      - run: go test -race -covermode=atomic -timeout 2m ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@db9de0fc1a667e1a49d2291a1a042dff081d78f6 # v9
        with:
          version: v2.11.1
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.10 ./...
      - run: go run github.com/zricethezav/gitleaks/v8@v8.27.2 detect --source . --no-git
      - run: make fuzz
      - run: ./scripts/verify-release-gates.sh

  configuration:
    name: Configuration lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint@sha256:27086352fd5e1907ea2b934eb1023f217c5ae087992eb59fde121dce9c9ff21e < Dockerfile
      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo:ro" -w /repo rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9
      - name: Verify deployment artifacts
        run: ./scripts/verify-deployment-files.sh
      - name: Build the reviewed container context
        run: docker build --tag punaro:ci .
      - name: Verify container command set
        run: sh scripts/verify-container-binaries.sh

  windows:
    name: Windows client build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go test ./internal/attachment/v3/controller
      - run: go test ./internal/attachment/v3 -run '^TestWindows'
      - run: go test ./internal/attachment/v2 -run '^TestWindows'
      - run: go test ./internal/adapter -run '^TestWindows'
      - run: go test ./cmd/punaro-attachment -run '^TestWindows'
      - run: go vet ./...
      - run: go build ./...
      - shell: pwsh
        run: ./scripts/test-install-client-windows.ps1
