services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie@sha256:b7337db8fe39d12fe8ecb0003c72680f24479813a744b43154eee6f2eab5a5f3
    environment:
      POSTGRES_DB: punaro
      POSTGRES_USER: punaro_owner
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./deploy/postgres-test-init.sql:/docker-entrypoint-initdb.d/10-punaro-test.sql:ro
    networks:
      - postgres-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punaro_owner -d punaro"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    stop_grace_period: 10s

  postgres-tests:
    build:
      context: .
      target: build
    command: ["go", "test", "-p", "1", "-count=1", "-timeout", "8m", "./internal/postgres", "./cmd/punaro"]
    user: "65532:65532"
    environment:
      HOME: /tmp
      GOCACHE: /tmp/punaro-go-build
      PUNARO_TEST_POSTGRES_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro?sslmode=disable
      PUNARO_TEST_POSTGRES_APP_DSN: postgres://punaro_app@postgres:5432/punaro?sslmode=disable
      PUNARO_TEST_POSTGRES_OTHER_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_other?sslmode=disable
      PUNARO_TEST_POSTGRES_PAIR_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_pair?sslmode=disable
      PUNARO_TEST_POSTGRES_PAIR_APP_DSN: postgres://punaro_app@postgres:5432/punaro_pair?sslmode=disable
      PUNARO_TEST_RESTORE_SOURCE_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_restore_source?sslmode=disable
      PUNARO_TEST_RESTORE_SOURCE_APP_DSN: postgres://punaro_app@postgres:5432/punaro_restore_source?sslmode=disable
      PUNARO_TEST_RESTORE_TARGET_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_restore_target?sslmode=disable
      PUNARO_TEST_RESTORE_TARGET_APP_DSN: postgres://punaro_app@postgres:5432/punaro_restore_target?sslmode=disable
      PUNARO_TEST_UPDATE_SOURCE_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_update_source?sslmode=disable
      PUNARO_TEST_UPDATE_SOURCE_APP_DSN: postgres://punaro_app@postgres:5432/punaro_update_source?sslmode=disable
      PUNARO_TEST_UPDATE_TARGET_OWNER_DSN: postgres://punaro_owner@postgres:5432/punaro_update_target?sslmode=disable
      PUNARO_TEST_UPDATE_TARGET_APP_DSN: postgres://punaro_app@postgres:5432/punaro_update_target?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres-test

networks:
  postgres-test:
    internal: true

volumes:
  postgres-data:
