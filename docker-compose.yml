services:
  punarod:
    build: .
    init: true
    environment:
      PUNARO_DATA_DIR: /var/lib/punaro
    volumes:
      - punaro-data:/var/lib/punaro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: none
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
    restart: unless-stopped
volumes:
  punaro-data:
